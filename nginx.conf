server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy les appels API vers le backend externe
    # Le navigateur appelle /api/v1/... → nginx redirige vers asapbackend.kikandi.com
    location /api/ {
        proxy_pass         https://asapbackend.kikandi.com/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              asapbackend.kikandi.com;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
